name: PE VC Full-List Intelligence

on:
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send after generation and validation"
        type: boolean
        default: true

concurrency:
  group: pe-vc-full-list-intelligence
  cancel-in-progress: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      RECIPIENTS: daniel.lu@dtcap.com,jing.guo@dtdyfund.com,roxan.tong@dtdyfund.com,alison.lee@dtdyfund.com,readylinoffice@gmail.com

      AI_WEB_BASE_URL: https://aiweb-roan.vercel.app
      AI_WEB_TIMEOUT: "120"
      AI_WEB_DISCOVER_DIRECT_RSS: "0"
      SEARCH_DAYS: "7"
      MAX_ITEMS: "0"
      URL_VERIFY_WORKERS: "16"

      AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
      AGNES_BASE_URL: https://apihub.agnes-ai.com/v1
      AGNES_MODEL: agnes-2.0-flash
      AI_HTTP_TIMEOUT: "300"
      EMAIL_DELIVERY_MODE: inline
      ALLOW_EMPTY_REPORT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore intelligence cache
        uses: actions/cache@v4
        with:
          path: .cache/intelligence
          key: pe-intelligence-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pe-intelligence-${{ runner.os }}-

      - name: Generate report
        run: |
          python3 pe_vc_weekly_report.py \
            --dry-run \
            --lookback-days 7 \
            --recipients "${RECIPIENTS}"

      - name: Validate configured list and HTML structure
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("config.json").read_text(encoding="utf-8"))
          configured = {
              str(row.get("name", "")).strip() if isinstance(row, dict) else str(row).strip()
              for rows in config.get("categories", {}).values()
              for row in rows
          }
          configured.discard("")

          report = json.loads(Path("pe_vc_weekly_last_report.json").read_text(encoding="utf-8"))
          coverage = report.get("collection_coverage", {})
          if coverage.get("configured_companies") != len(configured):
              raise SystemExit(
                  f"Configured-company coverage mismatch: expected {len(configured)}, got {coverage}"
              )
          if not report.get("items"):
              raise SystemExit("Report has no items")
          html = Path("pe_vc_weekly_last_report.html").read_text(encoding="utf-8")
          required = ["PE/VC WEEKLY INTELLIGENCE", "信息检索时间范围", "本期简报共"]
          missing = [value for value in required if value not in html]
          if missing:
              raise SystemExit(f"Reference HTML structure missing: {missing}")
          print(json.dumps({"items": len(report["items"]), "coverage": coverage}, ensure_ascii=False))
          PY

      - name: Send validated inline HTML
        if: inputs.send_email
        run: |
          python3 pe_vc_weekly_report.py \
            --send-existing \
            --recipients "${RECIPIENTS}"

      - name: Upload generated report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pe-vc-full-list-report
          path: |
            pe_vc_weekly_last_report.json
            pe_vc_weekly_last_report.html
          if-no-files-found: error
