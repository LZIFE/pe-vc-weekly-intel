name: PE/VC Competitive Intelligence Daily

on:
  schedule:
    # Beijing 9:45 = UTC 1:45 — collection starts
    - cron: "45 1 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: "587"
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      RECIPIENTS: readylinoffice@gmail.com
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL || 'https://api.moonshot.cn/v1' }}
      KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2.6' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://ai.ctaigw.cn/v1' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      RSSHUB_BASE_URL: http://127.0.0.1:1200
      HTTP_TIMEOUT: "20"
      ENABLE_TARGETED_RSS_SEARCH: "1"
      TARGETED_RSS_COMPANY_LIMIT: "0"
      MAX_ITEMS: "0"
      EMAIL_CHUNK_SIZE: "25"
      EMAIL_DELIVERY_MODE: "auto"
      AI_HTTP_TIMEOUT: "3600"
      BATCH_SIZE: "8"
      BATCH_SEARCH_DELAY: "2"
      SEARCH_DAYS: "90"
      RSS_RETRIES: "3"
      RSS_FALLBACK_URL: "https://rsshub.app"
      ALLOW_EMPTY_REPORT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start local RSSHub
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:1200/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs rsshub
          exit 1

      - name: Generate PE/VC daily intelligence report
        run: |
          python3 pe_vc_weekly_report.py \
            --dry-run \
            --recipients "${RECIPIENTS}"

      - name: Wait until Beijing 11:30 before sending
        run: |
          # Beijing 11:30 = UTC 3:30
          TARGET_HOUR=3
          TARGET_MIN=30
          CURRENT_EPOCH="$(date -u +%s)"
          TODAY_TARGET="$(date -u -d "$(date -u +%Y-%m-%d) ${TARGET_HOUR}:${TARGET_MIN}:00" +%s 2>/dev/null || date -u -j -f '%Y-%m-%d %H:%M:%S' "$(date -u +%Y-%m-%d) ${TARGET_HOUR}:${TARGET_MIN}:00" +%s)"
          if [ "$CURRENT_EPOCH" -lt "$TODAY_TARGET" ]; then
            WAIT_SEC=$((TODAY_TARGET - CURRENT_EPOCH))
            echo "Waiting ${WAIT_SEC}s until Beijing 11:30 before sending."
            sleep "${WAIT_SEC}"
          else
            echo "Beijing 11:30 has already passed; sending immediately."
          fi

      - name: Send generated report
        run: |
          python3 pe_vc_weekly_report.py \
            --send-existing \
            --recipients "readylinoffice@gmail.com"

      - name: Upload generated report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pe-vc-daily-report
          path: |
            pe_vc_weekly_last_report.json
            pe_vc_weekly_last_report.html
          if-no-files-found: ignore