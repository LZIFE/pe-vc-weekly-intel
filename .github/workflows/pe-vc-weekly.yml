name: PE VC Full-List Intelligence

on:
  schedule:
    # Beijing 06:30. Generate first, then wait until 09:00 to send.
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send after generation and validation"
        type: boolean
        default: true

concurrency:
  group: pe-vc-full-list-intelligence
  cancel-in-progress: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      SMTP_HOST: smtp.163.com
      SMTP_PORT: "994"
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      RECIPIENTS: readylinoffice@gmail.com,roxan.tong@dtdyfund.com

      # RSS searches every configured manager first.
      RSSHUB_BASE_URL: http://127.0.0.1:1200
      RSS_FALLBACK_URL: https://rsshub.app
      ENABLE_TARGETED_RSS_SEARCH: "1"
      TARGETED_RSS_COMPANY_LIMIT: "0"
      RSS_SEARCH_WORKERS: "8"
      RSS_COVERAGE_MIN_ITEMS: "1"
      SEARCH_HTTP_TIMEOUT: "20"
      RSS_RETRIES: "2"
      SEARCH_DAYS: "90"
      MAX_ITEMS: "0"
      URL_VERIFY_WORKERS: "16"

      # Doubao is search-only and receives only RSS-uncovered managers.
      ARK_SEARCH_API_KEY: ${{ secrets.ARK_SEARCH_API_KEY }}
      ARK_SEARCH_MODE: responses
      ARK_RESPONSES_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
      ARK_SEARCH_MODEL: doubao-seed-2-1-turbo-260628
      DOUBAO_PE_COMPANY_LIMIT: "0"
      DOUBAO_SEARCH_STREAM: "1"
      DOUBAO_SEARCH_TIMEOUT: "300"
      DOUBAO_SEARCH_MAX_RETRIES: "1"
      DOUBAO_SEARCH_RESULT_COUNT: "20"
      DOUBAO_SEARCH_BATCH_SIZE: "20"
      DOUBAO_SEARCH_WORKERS: "2"

      # Agnes performs non-search reading and trend summarization.
      AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
      AGNES_BASE_URL: https://apihub.agnes-ai.com/v1
      AGNES_MODEL: agnes-2.0-flash
      AI_HTTP_TIMEOUT: "300"
      EMAIL_DELIVERY_MODE: inline
      ALLOW_EMPTY_REPORT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore intelligence cache
        uses: actions/cache@v4
        with:
          path: .cache/intelligence
          key: pe-intelligence-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pe-intelligence-${{ runner.os }}-

      - name: Start local RSSHub
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub
          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:1200/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs rsshub
          exit 1

      - name: Generate complete company-grouped report
        run: |
          python3 pe_vc_weekly_report.py \
            --dry-run \
            --lookback-days 90 \
            --recipients "${RECIPIENTS}"

      - name: Validate full configured list and reference HTML structure
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("pe_vc_weekly_last_report.json").read_text())
          coverage = report.get("collection_coverage", {})
          if coverage.get("configured_companies") != 435:
              raise SystemExit(f"Expected the complete 435-manager list, got {coverage}")
          if not report.get("items"):
              raise SystemExit("Report has no items")
          html = Path("pe_vc_weekly_last_report.html").read_text()
          required = ["PE/VC Weekly Intel", "活跃机构数", "趋势分析与结论"]
          missing = [value for value in required if value not in html]
          if missing:
              raise SystemExit(f"Reference HTML structure missing: {missing}")
          print(json.dumps({"items": len(report["items"]), "coverage": coverage}, ensure_ascii=False))
          PY

      - name: Wait until Beijing 09:00
        if: github.event_name == 'schedule' || inputs.send_email
        run: |
          NOW="$(date -u +%s)"
          BEIJING_DATE="$(TZ=Asia/Shanghai date +%F)"
          TARGET="$(date -u -d "${BEIJING_DATE} 01:00:00" +%s)"
          if [ "${NOW}" -lt "${TARGET}" ]; then
            sleep "$((TARGET - NOW))"
          fi

      - name: Send validated inline HTML
        if: github.event_name == 'schedule' || inputs.send_email
        run: |
          python3 pe_vc_weekly_report.py \
            --send-existing \
            --recipients "${RECIPIENTS}"

      - name: Upload generated report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pe-vc-full-list-report
          path: |
            pe_vc_weekly_last_report.json
            pe_vc_weekly_last_report.html
          if-no-files-found: error
